<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ title or '本機檔案' }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <h1 class="site-title">{{ title or '本機檔案' }}</h1>
                <ul class="nav-menu">
                    <li><a href="/">檔案</a></li>
                    <li><a href="/announcements">公告</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p class="footer-text">本機檔案啟動器</p>
        </div>
    </footer>

    <!-- 內嵌資料容器 -->
    <script id="filelist-data" type="application/json">
    {% block filelist_data %}{}{% endblock %}
    </script>

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/render.js') }}"></script>
    <script src="{{ url_for('static', filename='js/bridge.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
