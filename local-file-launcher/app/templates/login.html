<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - 本機檔案啟動器</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-container {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header h1 {
            color: #2c3e50;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .login-header p {
            color: #7f8c8d;
            font-size: 0.95rem;
        }
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            margin-bottom: 0.5rem;
            color: #34495e;
            font-weight: 500;
        }
        .form-group input {
            padding: 0.75rem;
            border: 2px solid #e1e8ed;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .login-button {
            padding: 0.875rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .login-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-message {
            background-color: #fee;
            color: #c33;
            padding: 0.75rem;
            border-radius: 6px;
            border-left: 4px solid #c33;
            display: none;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 0.75rem;
            border-radius: 6px;
            border-left: 4px solid #28a745;
            display: none;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .login-footer {
            margin-top: 2rem;
            text-align: center;
            color: #7f8c8d;
            font-size: 0.85rem;
        }
        .icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="icon">📁</div>
            <h1>本機檔案啟動器</h1>
            <p>請輸入您的名稱以開始使用</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="username">使用者名稱</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="請輸入您的名稱"
                    minlength="2"
                    maxlength="20"
                    required
                    autofocus
                />
            </div>
            <button type="submit" class="login-button" id="loginButton">
                登入
            </button>
        </form>

        <div class="login-footer">
            不需要密碼，只需輸入名稱即可開始使用
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const button = document.getElementById('loginButton');

            // 清除訊息
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            // 驗證
            if (!username) {
                errorDiv.textContent = '請輸入使用者名稱';
                errorDiv.style.display = 'block';
                return;
            }

            if (username.length < 2 || username.length > 20) {
                errorDiv.textContent = '使用者名稱長度必須在 2-20 個字元之間';
                errorDiv.style.display = 'block';
                return;
            }

            // 停用按鈕
            button.disabled = true;
            button.textContent = '登入中...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username })
                });

                const data = await response.json();

                if (data.ok) {
                    successDiv.textContent = data.message || '登入成功！';
                    successDiv.style.display = 'block';

                    // 延遲後重導向
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    errorDiv.textContent = data.error || '登入失敗';
                    errorDiv.style.display = 'block';
                    button.disabled = false;
                    button.textContent = '登入';
                }
            } catch (error) {
                errorDiv.textContent = '網路錯誤，請稍後再試';
                errorDiv.style.display = 'block';
                button.disabled = false;
                button.textContent = '登入';
            }
        });
    </script>
</body>
</html>
